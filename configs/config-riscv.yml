# Linux Kernel 7.0.1 Configuration for RISC-V Embedded
# Target: RISC-V embedded systems, development boards, and servers
# Optimized for minimal size and RISC-V architecture

CONFIG_LOCALVERSION="-riscv"
CONFIG_DEFAULT_HOSTNAME="custom-kernel-riscv"

# RISC-V architecture
CONFIG_64BIT=y
CONFIG_RISCV=y
CONFIG_ARCH_GENERIC=y
CONFIG_ARCH_QEMU_VIRT=y
CONFIG_ARCH_SIFIVE=y
CONFIG_ARCH_SUNXI=y
CONFIG_ARCH_THEAD=y
CONFIG_ARCH_RV32I=y
CONFIG_ARCH_RV64I=y
CONFIG_RISCV_ISA_C=y
CONFIG_RISCV_ISA_A=y
CONFIG_RISCV_ISA_M=y
CONFIG_RISCV_ISA_SUPERSEC=y

# Processor type and features
CONFIG_SMP=y
CONFIG_NR_CPUS=64
CONFIG_HOTPLUG_CPU=y
CONFIG_TORTURE_TEST=m

# Kernel Features
CONFIG_NANO_MALLOC=y
CONFIG_SETUP_UID_MAP=y

# General setup
CONFIG_INITRAMFS_SOURCE=""
CONFIG_SYSVIPC=y
CONFIG_POSIX_TIMERS=y
CONFIG_HIGH_RES_TIMERS=y
CONFIG_BSD_PROCESS_ACCT=y
CONFIG_CGROUP_FREEZER=y
CONFIG_CGROUP_DEVICE=y
CONFIG_CPUSETS=y
CONFIG_PROC_PID_CPUSET=y
CONFIG_CGROUP_CPUACCT=y
CONFIG_RESOURCE_COUNTERS=y
CONFIG_MEMCG=y
CONFIG_CGROUP_PERF=y
CONFIG_NET_NS=y
CONFIG_PID_NS=y
CONFIG_SCHED_AUTOGROUP=y

# Memory management
CONFIG_ZONE_DMA32=y
CONFIG_ZONE_DMA=y
CONFIG_ARCH_ZONE_DMA=y
CONFIG_NUMA=y
CONFIG_NODES_SHIFT=4
CONFIG_HAVE_MEMBLOCK=y

# Memory hotplug
CONFIG_MEMORY_HOTPLUG=y
CONFIG_MEMORY_HOTPLUG_DEFAULT_ONLINE=y

# Networking
CONFIG_NET=y
CONFIG_PACKET=y
CONFIG_UNIX=y
CONFIG_XFRM=y
CONFIG_NET_KEY=m
CONFIG_INET=y
CONFIG_IP_PNP=y
CONFIG_IP_PNP_DHCP=y
CONFIG_IP_PNP_BOOTP=y
CONFIG_IP_PNP_RARP=y
CONFIG_INET_AH=m
CONFIG_INET_ESP=m
CONFIG_INET_ESP_OFFLOAD=m
CONFIG_INET_IPCOMP=m
CONFIG_INET_DIAG=m
CONFIG_TCP_CONG_ADVANCED=y
CONFIG_TCP_CONG_BBR=m
CONFIG_TCP_MD5SIG=y
CONFIG_NETFILTER=y
CONFIG_NF_CONNTRACK=m
CONFIG_NF_LOG_IPV4=m
CONFIG_NF_REJECT_IPV4=m
CONFIG_IP_NF_IPTABLES=m
CONFIG_IP_NF_FILTER=m
CONFIG_IP_NF_TARGET_REJECT=m
CONFIG_NF_NAT_IPV4=m
CONFIG_IP_NF_MANGLE=m
CONFIG_IP_NF_RAW=m

# Ethernet
CONFIG_ETHERNET=y
CONFIG_NET_VENDOR_SMSC=y
CONFIG_SMSC911X=y
CONFIG_MDIO_BITBANG=y
CONFIG_NET_VENDOR_CADENCE=y
CONFIG_MACB=y

# VirtIO (for virtualization)
CONFIG_VIRTIO=m
CONFIG_VIRTIO_RING=m
CONFIG_VIRTIO_PCI=m
CONFIG_VIRTIO_BALLOON=m
CONFIG_VIRTIO_CONSOLE=m
CONFIG_VIRTIO_NET=m
CONFIG_VIRTIO_BLOCK=m
CONFIG_VIRTIO_SCSI=m

# SCSI
CONFIG_SCSI=y
CONFIG_BLK_DEV_SD=y
CONFIG_CHR_DEV_SG=y

# Filesystems
CONFIG_EXT4_FS=y
CONFIG_EXT4_FS_POSIX_ACL=y
CONFIG_EXT4_FS_SECURITY=y
CONFIG_JBD2=y
CONFIG_FS_MBCACHE=y
CONFIG_OVERLAY_FS=m
CONFIG_FAT_DEFAULT_IOCHARSET="utf8"
CONFIG_VFAT_FS=y
CONFIG_NFS_V4_2=y
CONFIG_NFS_V4_1=y
CONFIG_NFS_V4=y
CONFIG_9P_FS=m
CONFIG_9P_FS_POSIX_ACL=y
CONFIG_SQUASHFS=y
CONFIG_SQUASHFS_FILE_CACHE=y

# Cryptographic API
CONFIG_CRYPTO=y
CONFIG_CRYPTO_AUTHENC=y
CONFIG_CRYPTO_CAMELLIA=m
CONFIG_CRYPTO_DES=y
CONFIG_CRYPTO_DEFLATE=y
CONFIG_CRYPTO_LZO=y
CONFIG_CRYPTO_LZ4=m
CONFIG_CRYPTO_ZSTD=m
CONFIG_CRYPTO_MD5=y
CONFIG_CRYPTO_SHA1=y
CONFIG_CRYPTO_SHA256=y
CONFIG_CRYPTO_SHA512=y
CONFIG_CRYPTO_GCM=y
CONFIG_CRYPTO_CCM=y

# CPU Frequency scaling
CONFIG_CPU_FREQ=y
CONFIG_CPU_FREQ_GOV_ATTR_SET=y
CONFIG_CPU_FREQ_GOV_COMMON=y
CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y
CONFIG_CPU_FREQ_GOV_PERFORMANCE=y
CONFIG_CPU_FREQ_GOV_POWERSAVE=y
CONFIG_CPU_FREQ_GOV_USERSPACE=y
CONFIG_CPU_FREQ_GOV_ONDEMAND=y
CONFIG_CPU_FREQ_GOV_CONSERVATIVE=y

# Performance monitoring
CONFIG_PERF_EVENTS=y
CONFIG_HW_PERF_EVENTS=y
CONFIG_RISCV_PMU_SBI=y

# Kernel hacking (minimal for production)
CONFIG_DEBUG_KERNEL=y
CONFIG_DEBUG_INFO=n
CONFIG_KALLSYMS=y
CONFIG_KALLSYMS_ALL=n

# ACPI
CONFIG_ACPI=y
CONFIG_ACPI_GENERIC_GSI=y
CONFIG_ACPI_REV_OVERRIDE_POSSIBLE=y

# Device Drivers
CONFIG_DEVTMPFS=y
CONFIG_DEVTMPFS_MOUNT=y

# GPIO
CONFIG_GPIOLIB=y
CONFIG_GPIO_SYSFS=y

# I2C
CONFIG_I2C=y
CONFIG_I2C_CHARDEV=m
CONFIG_I2C_MUX=m

# SPI
CONFIG_SPI=y
CONFIG_SPI_MEM=m

# MMC/SD
CONFIG_MMC=y
CONFIG_MMC_BLOCK=y
CONFIG_MMC_SDHCI=y
CONFIG_MMC_SDHCI_PLTFM=y

# NVMe
CONFIG_NVME_CORE=m
CONFIG_BLK_DEV_NVME=m

# Pin controller
CONFIG_PINCTRL=y

# Random
CONFIG_HW_RANDOM=y
CONFIG_HW_RANDOM_VIRTIO=m

# Power management
CONFIG_SUSPEND=y
CONFIG_SUSPEND_FREEZER=y
CONFIG_HIBERNATION=y
CONFIG_PM_SLEEP=y

# Kexec
CONFIG_KEXEC_CORE=y
CONFIG_KEXEC=y

# Audit
CONFIG_AUDIT=y

# EFI
CONFIG_EFI=y
CONFIG_EFI_STUB=y

# Device tree
CONFIG_OF=y
CONFIG_OF_FLATTREE=y
CONFIG_OF_EARLY_FLATTREE=y
CONFIG_OF_ADDRESS=y
CONFIG_OF_IRQ=y
CONFIG_OF_NET=y

# TCP/IP congestion
CONFIG_TCP_CONG_BBR=y
CONFIG_DEFAULT_BBR=y

# Modules
CONFIG_MODULES=y
CONFIG_MODULE_UNLOAD=y
CONFIG_MODULE_FORCE_UNLOAD=y

# CPU idle
CONFIG_CPU_IDLE=y
CONFIG_CPU_IDLE_MULTIPLE_DRIVERS=y
CONFIG_CPU_IDLE_GOV_MENU=y

# RISC-V specific
CONFIG_RISCV_BOOT_SPINEL=y
CONFIG_ERRATA_ALL=y
CONFIG_M_MODE=y
CONFIG_SBI=y
CONFIG_SBI_V01=y
CONFIG_RISCV_ISA_ZICBOM=y
CONFIG_RISCV_ISA_ZICBOZ=y

# Jump labels
CONFIG_JUMP_LABEL=y

# Locking
CONFIG_LOCK_MM_AND_TLB_FAST_PATH=y